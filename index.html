<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HackMore - CSG Raymarcher (WebGL 2)</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <canvas id="webgl"></canvas>

  <div id="hud">
    <strong>HackMore - CSG Raymarcher</strong><br>
    WebGL 2 / GLSL ES 3.00 &middot; map() generato per scena<br>
    drag = ruota &middot; wheel = zoom &middot; drop .csg = importa<br>

    <div class="row">
      scena <select id="sceneSelect"></select>
    </div>

    <div class="row">
      <button id="loadCsgBtn" type="button">+ carica .csg...</button>
      <input  id="csgFileInput" type="file" accept=".csg" multiple>
    </div>

    <div class="row">
      <label for="testCubeToggle">
        <input type="checkbox" id="testCubeToggle"> cubo test
      </label>
      <span class="hint">frecce / PgUp/PgDn / +- / R</span>
    </div>
    <span id="testCubePos" style="display:none; color:#fbbf24"></span>
    <br>

    <span id="status">init...</span><br>
    <span id="fps"></span>
  </div>

  <!-- ============================================================
       Ordine di caricamento (script sincroni):
         1) sorgenti shader (template + VS)
         2) helper WebGL (compile/link)
         3) generatore di codice GLSL
         4) registry scene + helper L/U/I/D/TS
         5) scene .js hand-written (si registrano in CsgScenes)
         6) parser .csg e manifest embeddati
         7) autoloader (parse + registra ogni .csg embedded)
         8) camera
         9) main (entry point - costruisce dropdown)
       ============================================================ -->
  <script src="shaders/csg.vert.js"></script>
  <script src="shaders/csg.frag.template.js"></script>

  <script src="js/webgl-utils.js"></script>
  <script src="js/csg-codegen.js"></script>

  <script src="scenes/registry.js"></script>
  <script src="scenes/test_00.js"></script>
  <script src="scenes/test_02.js"></script>
  <script src="scenes/test_05.js"></script>
  <script src="scenes/test_07.js"></script>

  <script src="js/csg-parser.js"></script>
  <script src="csg/manifest.js"></script>
  <script src="js/csg-autoload.js"></script>

  <script src="js/camera.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
